deployment:
  tasks:
    # ============================================================
    # LOG DE DEPLOY - para diagnosticar falhas
    # ============================================================
    - export DEPLOY_LOG=/home/tech1694/deploy_cpanel.log
    - echo "" >> $DEPLOY_LOG
    - echo "========================================" >> $DEPLOY_LOG
    - echo "DEPLOY PROD INICIADO em $(date '+%Y-%m-%d %H:%M:%S')" >> $DEPLOY_LOG
    - echo "Diretorio atual: $(pwd)" >> $DEPLOY_LOG
    - echo "Usuario: $(whoami)" >> $DEPLOY_LOG
    - echo "Branch atual do repositorio: $(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'N/A')" >> $DEPLOY_LOG
    - echo "Ultimo commit: $(git log -1 --format='%h - %s (%ci)' 2>/dev/null || echo 'N/A')" >> $DEPLOY_LOG
    - echo "Status do repositorio:" >> $DEPLOY_LOG
    - git status --short >> $DEPLOY_LOG 2>&1 || echo "AVISO: nao foi possivel obter git status" >> $DEPLOY_LOG
    - echo "" >> $DEPLOY_LOG




    # ============================================================
    # VARIAVEIS DE ORIGEM
    # ============================================================
    - export GENERAL=/home/tech1694/repositories/prod/*
    - export DOMAIN=/home/tech1694/repositories/prod/armazem_paraiba/*
    - echo "GENERAL: /home/tech1694/repositories/prod/*" >> $DEPLOY_LOG
    - echo "DOMAIN: /home/tech1694/repositories/prod/armazem_paraiba/*" >> $DEPLOY_LOG
    - echo "" >> $DEPLOY_LOG




    # ============================================================
    # VARIAVEIS DE DESTINO
    # ============================================================
    - export GENERALDEPLOY=/home/tech1694/public_html/gestaodeponto/
    - export BLUEROAD=/home/tech1694/public_html/gestaodeponto/blueroad
    - export BRASO=/home/tech1694/public_html/gestaodeponto/braso
    - export CARAU=/home/tech1694/public_html/gestaodeponto/carau_transporte
    - export COMAV=/home/tech1694/public_html/gestaodeponto/comav
    - export FEIJAO=/home/tech1694/public_html/gestaodeponto/feijao_turqueza
    - export FS_LOG=/home/tech1694/public_html/gestaodeponto/fs_log_transportes
    - export HN_TRANSP=/home/tech1694/public_html/gestaodeponto/hn_transportes
    - export IFRN=/home/tech1694/public_html/gestaodeponto/ifrn
    - export JRJ_ORG=/home/tech1694/public_html/gestaodeponto/jrj_organizacao
    - export LOGSYNC=/home/tech1694/public_html/gestaodeponto/logsync_techps
    - export LEMON=/home/tech1694/public_html/gestaodeponto/lemon
    - export NH_TRANSP=/home/tech1694/public_html/gestaodeponto/nh_transportes
    - export OPAFRUTAS=/home/tech1694/public_html/gestaodeponto/opafrutas
    - export PKF=/home/tech1694/public_html/gestaodeponto/pkf_medeiros
    - export QUALY=/home/tech1694/public_html/gestaodeponto/qualy_transportes
    - export TECHPS=/home/tech1694/public_html/gestaodeponto/techps
    - export TECHPSDEMO=/home/tech1694/public_html/gestaodeponto/techps_demo
    - export TRAMPGAS=/home/tech1694/public_html/gestaodeponto/trampolim_gas
    - export TRANSCOPEL=/home/tech1694/public_html/gestaodeponto/transcopel
    - export SAO_LUCAS=/home/tech1694/public_html/gestaodeponto/sao_lucas
    - export PB_TRANSPORTES=/home/tech1694/public_html/gestaodeponto/pb_transportes
    - export ODONTOTANGARA=/home/tech1694/public_html/gestaodeponto/odontotangara
    - export CLINICA_GERLANE=/home/tech1694/public_html/gestaodeponto/clinica_gerlane
    - export IRANEIDE_OLIVEIRA=/home/tech1694/public_html/gestaodeponto/iraneide_oliveira
    - export MIDIA_DIGITAL=/home/tech1694/public_html/gestaodeponto/midia_digital
    - export ENOVE=/home/tech1694/public_html/gestaodeponto/enove
    - export T_MILITAO=/home/tech1694/public_html/gestaodeponto/t_militao
    - export LAUTO=/home/tech1694/public_html/gestaodeponto/lauto
    - export GST=/home/tech1694/public_html/gestaodeponto/gst




    # ============================================================
    # VERIFICACAO DAS PASTAS DE DESTINO
    # ============================================================
    - echo "Verificando existencia das pastas de destino..." >> $DEPLOY_LOG
    - for dir in "$GENERALDEPLOY" "$BLUEROAD" "$BRASO" "$CARAU" "$COMAV" "$FEIJAO" "$FS_LOG" "$HN_TRANSP" "$IFRN" "$JRJ_ORG" "$LOGSYNC" "$LEMON" "$NH_TRANSP" "$OPAFRUTAS" "$PKF" "$QUALY" "$TECHPS" "$TECHPSDEMO" "$TRAMPGAS" "$TRANSCOPEL" "$SAO_LUCAS" "$PB_TRANSPORTES" "$ODONTOTANGARA" "$CLINICA_GERLANE" "$IRANEIDE_OLIVEIRA" "$MIDIA_DIGITAL" "$ENOVE" "$T_MILITAO" "$LAUTO" "$GST"; do if [ -d "$dir" ]; then echo "  OK (existe): $dir" >> $DEPLOY_LOG; else echo "  AVISO (nao existe): $dir" >> $DEPLOY_LOG; fi; done
    - echo "" >> $DEPLOY_LOG




    # ============================================================
    # COPIA DOS ARQUIVOS GERAIS
    # ============================================================
    - echo "[$(date '+%H:%M:%S')] Copiando arquivos gerais para $GENERALDEPLOY ..." >> $DEPLOY_LOG
    - /bin/cp -R $GENERAL $GENERALDEPLOY >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: GENERAL -> GENERALDEPLOY" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: GENERAL -> GENERALDEPLOY" >> $DEPLOY_LOG
    - echo "" >> $DEPLOY_LOG




    # ============================================================
    # COPIA DOS ARQUIVOS ESPECIFICOS (armazem_paraiba) PARA CADA CLIENTE
    # ============================================================
    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> BLUEROAD ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $BLUEROAD >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> BLUEROAD" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> BLUEROAD" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> BRASO ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $BRASO >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> BRASO" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> BRASO" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> CARAU ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $CARAU >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> CARAU" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> CARAU" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> COMAV ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $COMAV >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> COMAV" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> COMAV" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> FEIJAO ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $FEIJAO >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> FEIJAO" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> FEIJAO" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> FS_LOG ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $FS_LOG >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> FS_LOG" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> FS_LOG" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> HN_TRANSP ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $HN_TRANSP >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> HN_TRANSP" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> HN_TRANSP" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> IFRN ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $IFRN >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> IFRN" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> IFRN" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> JRJ_ORG ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $JRJ_ORG >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> JRJ_ORG" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> JRJ_ORG" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> LEMON ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $LEMON >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> LEMON" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> LEMON" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> LOGSYNC ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $LOGSYNC >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> LOGSYNC" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> LOGSYNC" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> NH_TRANSP ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $NH_TRANSP >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> NH_TRANSP" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> NH_TRANSP" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> OPAFRUTAS ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $OPAFRUTAS >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> OPAFRUTAS" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> OPAFRUTAS" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> PKF ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $PKF >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> PKF" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> PKF" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> QUALY ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $QUALY >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> QUALY" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> QUALY" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> TECHPS ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $TECHPS >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> TECHPS" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> TECHPS" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> TECHPSDEMO ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $TECHPSDEMO >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> TECHPSDEMO" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> TECHPSDEMO" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> TRAMPGAS ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $TRAMPGAS >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> TRAMPGAS" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> TRAMPGAS" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> TRANSCOPEL ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $TRANSCOPEL >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> TRANSCOPEL" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> TRANSCOPEL" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> SAO_LUCAS ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $SAO_LUCAS >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> SAO_LUCAS" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> SAO_LUCAS" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> PB_TRANSPORTES ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $PB_TRANSPORTES >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> PB_TRANSPORTES" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> PB_TRANSPORTES" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> ODONTOTANGARA ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $ODONTOTANGARA >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> ODONTOTANGARA" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> ODONTOTANGARA" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> CLINICA_GERLANE ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $CLINICA_GERLANE >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> CLINICA_GERLANE" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> CLINICA_GERLANE" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> IRANEIDE_OLIVEIRA ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $IRANEIDE_OLIVEIRA >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> IRANEIDE_OLIVEIRA" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> IRANEIDE_OLIVEIRA" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> MIDIA_DIGITAL ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $MIDIA_DIGITAL >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> MIDIA_DIGITAL" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> MIDIA_DIGITAL" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> ENOVE ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $ENOVE >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> ENOVE" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> ENOVE" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> T_MILITAO ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $T_MILITAO >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> T_MILITAO" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> T_MILITAO" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> LAUTO ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $LAUTO >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> LAUTO" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> LAUTO" >> $DEPLOY_LOG

    - echo "[$(date '+%H:%M:%S')] Copiando DOMAIN -> GST ..." >> $DEPLOY_LOG
    - /bin/cp -R $DOMAIN $GST >> $DEPLOY_LOG 2>&1 && echo "[$(date '+%H:%M:%S')] OK: DOMAIN -> GST" >> $DEPLOY_LOG || echo "[$(date '+%H:%M:%S')] ERRO: DOMAIN -> GST" >> $DEPLOY_LOG




    # ============================================================
    # FINALIZACAO
    # ============================================================
    - echo "[$(date '+%H:%M:%S')] DEPLOY PROD FINALIZADO" >> $DEPLOY_LOG
    - echo "========================================" >> $DEPLOY_LOG
